    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #e91e63; font-size: 24px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { border: 2px solid #e0e0e0; padding: 15px; border-radius: 8px; background: #fafafa; position: relative; }
        .card.active-a { border-color: #2196F3; }
        .card.active-b { border-color: #4CAF50; }
        label { display: block; margin-top: 10px; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 8px; font-size: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .suggest-box { position: absolute; background: white; border: 1px solid #ccc; width: calc(100% - 30px); max-height: 150px; overflow-y: auto; z-index: 10; border-radius: 4px; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .suggest-item { padding: 8px; cursor: pointer; font-size: 14px; }
        .suggest-item:hover { background: #eee; }
        .checkbox-group { margin-top: 12px; border-top: 1px dashed #ccc; padding-top: 8px; }
        .checkbox-group label { font-weight: normal; font-size: 14px; display: flex; align-items: center; gap: 5px; cursor: pointer; margin-top: 5px; }
        .adjust-group { background: #eef2f7; padding: 8px; border-radius: 6px; margin-top: 8px; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; font-size: 18px; font-weight: bold; display: none; line-height: 1.5; }
    </style>

                <label><input type="checkbox" id="paralysis_a" onchange="updateAll('a')"> マヒ (0.5倍)</label>
            </div>
            
            <label>Sランク補正</label>

                <option value="-1">-1段階 (0.66倍)</option>

function showSuggest(prefix) {
    let input = document.getElementById('search_' + prefix).value.trim();
    let suggestBox = document.getElementById('suggest_' + prefix);
    suggestBox.innerHTML = '';
    
    if (!input) { suggestBox.style.display = 'none'; return; }
    
    let count = 0;
    for (let name in pokeDatabase) {
        if (name.includes(input)) {
            let item = document.createElement('div');
            item.className = 'suggest-item';
            item.textContent = `${name} (S:${pokeDatabase[name]})`;
            item.onclick = function() {
                document.getElementById('search_' + prefix).value = name;
                document.getElementById('s_race_' + prefix).value = pokeDatabase[name];
                suggestBox.style.display = 'none';
                updateAll(prefix);
            };
            suggestBox.appendChild(item);
            count++;
            if (count >= 5) break;
        }
    }
    suggestBox.style.display = count > 0 ? 'block' : 'none';
}

function calculateFinalS(prefix) {
    let race = parseFloat(document.getElementById('s_race_' + prefix).value) || 0;
    let ev = parseInt(document.getElementById('ev_style_' + prefix).value);
    let hasNature = document.getElementById('nature_' + prefix).checked;
    
    let s = Math.floor((race * 2 + 31 + Math.floor(ev / 4)) * 50 / 100) + 5;
    if (hasNature) s = Math.floor(s * 1.1);
    
    let rank = parseInt(document.getElementById('rank_' + prefix).value);
    if (rank > 0) s = Math.floor(s * (2 + rank) / 2);
    else if (rank < 0) s = Math.floor(s * 2 / (2 - rank));
    
    if (document.getElementById('scarf_' + prefix).checked) s = Math.floor(s * 1.5);
    if (document.getElementById('tailwind_' + prefix).checked) s = Math.floor(s * 2);
    if (document.getElementById('paralysis_' + prefix).checked) s = Math.floor(s * 0.5);
    
    document.getElementById('real_s_display_' + prefix).textContent = s;
    return s;
}

function compareSpeed() {
    let finalA = calculateFinalS('a');
    let finalB = calculateFinalS('b');
    
    let nameA = document.getElementById('search_a').value || 'ポケモンA';
    let nameB = document.getElementById('search_b').value || 'ポケモンB';
    
    let resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';
    
    if (finalA > finalB) {
        resultDiv.style.background = '#e3f2fd';
        resultDiv.style.color = '#0d47a1';
        resultDiv.innerHTML = `🎉 <strong>${nameA}</strong> が先制！<br><small>A: <strong>${finalA}</strong> ＞ B: <strong>${finalB}</strong></small>`;
    } else if (finalB > finalA) {
        resultDiv.style.background = '#e8f5e9';
        resultDiv.style.color = '#1b5e20';
        resultDiv.innerHTML = `🎉 <strong>${nameB}</strong> が先制！<br><small>A: <strong>${finalA}</strong> ＜ B: <strong>${finalB}</strong></small>`;
    } else {
        resultDiv.style.background = '#fff3e0';
        resultDiv.style.color = '#e65100';
        resultDiv.innerHTML = `⚠️ 同速判定！<br><small>両者 最終S: <strong>${finalA}</strong></small>`;
    }
}

function updateAll(prefix) {
    calculateFinalS(prefix);
    compareSpeed();
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('.card')) {
        document.getElementById('suggest_a').style.display = 'none';
        document.getElementById('suggest_b').style.display = 'none';
    }
});

    updateAll('a');

}
